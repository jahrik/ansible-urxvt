---
- name: Install urxvt
  ansible.builtin.include_tasks:
    file: install.yml
    apply:
      tags:
        - urxvt
        - urxvt:install
  when: install | default(true) | bool
  tags:
    - urxvt
    - urxvt:install

- name: Uninstall urxvt
  ansible.builtin.include_tasks:
    file: uninstall.yml
    apply:
      tags:
        - urxvt
        - urxvt:uninstall
  when: not (install | default(true) | bool)
  tags:
    - urxvt
    - urxvt:uninstall
