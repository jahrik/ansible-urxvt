---
- name: Install urxvt (Arch Linux)
  ansible.builtin.include_tasks: archlinux.yml
  when: ansible_os_family == 'Archlinux'

- name: Install urxvt (Debian)
  ansible.builtin.include_tasks: debian.yml
  when: ansible_os_family == 'Debian'

- name: Create ~/.urxvt/ext/ dir
  become: false
  ansible.builtin.file:
    path: "~/.urxvt/ext/"
    state: directory
    mode: '0755'
  tags: ['urxvt']

- name: Generate urxvt config files
  become: false
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "~/.urxvt/{{ item }}"
    mode: '0644'
  loop:
    - Xresources.dark
    - Xresources.light
    - dark.xresources
    - light.xresources
    - xresources
  tags: ['urxvt']

- name: Download urxvt font-size plugin
  become: false
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/majutsushi/urxvt-font-size/master/font-size
    dest: "~/.urxvt/ext/font-size"
    mode: '0644'
  tags: ['urxvt']
