---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Check urxvt binary
      ansible.builtin.stat:
        path: /usr/bin/urxvt
      register: urxvt_bin

    - name: Assert urxvt is installed
      ansible.builtin.assert:
        that: urxvt_bin.stat.exists
        fail_msg: "urxvt binary not found at /usr/bin/urxvt"

    - name: Check ~/.urxvt/ext directory
      ansible.builtin.stat:
        path: ~/.urxvt/ext
      register: urxvt_ext

    - name: Assert ~/.urxvt/ext directory exists
      ansible.builtin.assert:
        that: urxvt_ext.stat.exists and urxvt_ext.stat.isdir
        fail_msg: "~/.urxvt/ext directory not found"

    - name: Check xresources config files
      ansible.builtin.stat:
        path: "~/.urxvt/{{ item }}"
      register: urxvt_configs
      loop:
        - xresources
        - Xresources.dark
        - Xresources.light
        - dark.xresources
        - light.xresources

    - name: Assert all xresources configs exist
      ansible.builtin.assert:
        that: item.stat.exists
        fail_msg: "{{ item.item }} not found in ~/.urxvt/"
      loop: "{{ urxvt_configs.results }}"

    - name: Check font-size plugin
      ansible.builtin.stat:
        path: ~/.urxvt/ext/font-size
      register: font_size_plugin

    - name: Assert font-size plugin installed
      ansible.builtin.assert:
        that: font_size_plugin.stat.exists
        fail_msg: "~/.urxvt/ext/font-size not found"
